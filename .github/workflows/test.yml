name: Payroll Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: Vitest + React Testing Library ────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sushizen-shift-pwa/package-lock.json

      - name: Install dependencies
        working-directory: sushizen-shift-pwa
        run: npm ci

      - name: Install test dependencies
        working-directory: sushizen-shift-pwa
        run: |
          npm install --save-dev \
            vitest \
            @vitejs/plugin-react \
            @testing-library/react \
            @testing-library/user-event \
            @testing-library/jest-dom \
            jsdom

      - name: Run frontend tests
        working-directory: sushizen-shift-pwa
        run: npx vitest run --reporter=verbose

  # ── Backend: pytest + real PostgreSQL ───────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_sushizen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_sushizen
      STAFF_PIN_SALT: test-salt
      JWT_SECRET: test-jwt-secret
      ANTHROPIC_API_KEY: test-key
      DISCORD_BOT_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sushizen_shift_app_clean/requirements.txt

      - name: Install backend dependencies
        working-directory: sushizen_shift_app_clean
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov httpx

      - name: Run backend tests
        working-directory: sushizen_shift_app_clean
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -x

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: sushizen_shift_app_clean/coverage.xml
          flags: backend
